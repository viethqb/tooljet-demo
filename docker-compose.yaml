name: Tooljet app

services:
  tooljet:
    tty: true
    stdin_open: true
    container_name: Tooljet-app
    build:
      context: .
      dockerfile: Dockerfile
    image: viet1846/tooljet:v3.20.60-lts
    platform: linux/amd64
    restart: always
    env_file: .env
    ports:
      - 80:80
    depends_on:
      - postgres
      - redis
    environment:
      SERVE_CLIENT: "true"
      PORT: "80"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    command: npm run start:prod

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always

  postgres:
    container_name: ${PG_HOST}
    image: postgres:16
    restart: always
    volumes:
      - postgres:/var/lib/postgresql/data
    env_file: .env
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASS}

volumes:
  postgres:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${PWD}/postgres_data
  certs:
  logs:
  fallbackcerts:
